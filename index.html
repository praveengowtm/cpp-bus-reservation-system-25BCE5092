<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Reservation System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff; text-align: center; padding: 24px 16px;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.5px; }
    header p { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }

    .nav {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
      padding: 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
    }
    .nav button {
      padding: 10px 20px; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      background: #e8eaf6; color: #1a1a2e; transition: all 0.2s;
    }
    .nav button:hover { background: #1a1a2e; color: #fff; }

    .container { max-width: 700px; margin: 24px auto; padding: 0 16px; }

    .section { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .section h2 { font-size: 1.2rem; margin-bottom: 16px; color: #16213e; border-bottom: 2px solid #e8eaf6; padding-bottom: 8px; }
    .hidden { display: none; }

    .route-card {
      border: 1px solid #e8eaf6; border-radius: 10px; padding: 16px;
      margin-bottom: 12px; transition: box-shadow 0.2s;
    }
    .route-card:hover { box-shadow: 0 4px 16px rgba(26,26,46,0.1); }
    .route-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .route-id {
      background: #1a1a2e; color: #fff; padding: 4px 10px;
      border-radius: 6px; font-weight: 700; font-size: 0.85rem;
    }
    .route-name { font-weight: 600; font-size: 1rem; }
    .route-stops { color: #555; font-size: 0.9rem; margin-bottom: 8px; }
    .route-info { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .seat-badge {
      background: #c8e6c9; color: #2e7d32; padding: 4px 12px;
      border-radius: 20px; font-weight: 600; font-size: 0.8rem;
    }
    .seat-badge.full { background: #ffcdd2; color: #c62828; }

    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
    select, input[type="text"] {
      width: 100%; padding: 10px 14px; border: 1px solid #ccc;
      border-radius: 8px; font-size: 0.95rem; margin-bottom: 16px;
      outline: none; transition: border 0.2s;
    }
    select:focus, input[type="text"]:focus { border-color: #1a1a2e; }

    .btn {
      padding: 10px 24px; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      color: #fff; background: #1a1a2e; transition: background 0.2s;
    }
    .btn:hover { background: #0f3460; }

    .msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-weight: 600; }
    .msg.success { background: #e8f5e9; color: #2e7d32; }
    .msg.error { background: #ffebee; color: #c62828; }

    .ticket-card {
      border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px;
      background: #fafafa;
    }
    .ticket-row {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid #f0f0f0; font-size: 0.9rem;
    }
    .ticket-row:last-child { border-bottom: none; }
    .active-status { color: #2e7d32; }
    .cancelled-status { color: #c62828; }

    .revenue-row {
      padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem;
    }
    .revenue-total {
      margin-top: 16px; padding: 14px; background: #e8eaf6;
      border-radius: 8px; text-align: center; font-size: 1.1rem;
    }

    @media (max-width: 500px) {
      .nav { gap: 6px; }
      .nav button { padding: 8px 14px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>🚌 Bus Reservation System</h1>
    <p>Chennai Routes — Book, Cancel, Search & Report</p>
  </header>

  <div class="nav">
    <button onclick="viewRoutes()">View Routes</button>
    <button onclick="showBookForm()">Book Ticket</button>
    <button onclick="showCancelForm()">Cancel Ticket</button>
    <button onclick="showSearchForm()">Search Ticket</button>
    <button onclick="showRevenue()">Revenue Report</button>
  </div>

  <div class="container">

    <!-- Routes -->
    <div id="routesSection" class="section">
      <h2>Available Routes</h2>
      <div id="routesList"></div>
    </div>

    <!-- Book -->
    <div id="bookSection" class="section hidden">
      <h2>Book a Ticket</h2>
      <label for="bookRoute">Select Route</label>
      <select id="bookRoute"></select>
      <label for="bookName">Passenger Name</label>
      <input type="text" id="bookName" placeholder="Enter passenger name">
      <button class="btn" onclick="bookTicket()">Confirm Booking</button>
      <div id="bookResult" style="margin-top:16px"></div>
    </div>

    <!-- Cancel -->
    <div id="cancelSection" class="section hidden">
      <h2>Cancel a Ticket</h2>
      <label for="cancelId">Ticket ID</label>
      <input type="text" id="cancelId" placeholder="e.g. TKT1001">
      <button class="btn" onclick="cancelTicket()">Cancel Ticket</button>
      <div id="cancelResult" style="margin-top:16px"></div>
    </div>

    <!-- Search -->
    <div id="searchSection" class="section hidden">
      <h2>Search Ticket</h2>
      <label for="searchId">Ticket ID</label>
      <input type="text" id="searchId" placeholder="e.g. TKT1001">
      <button class="btn" onclick="searchTicket()">Search</button>
      <div id="searchResult" style="margin-top:16px"></div>
    </div>

    <!-- Revenue -->
    <div id="revenueSection" class="section hidden">
      <h2>Revenue Report</h2>
      <div id="revenueContent"></div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
