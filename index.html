<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Reservation System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #38bdf8;
    }

    header span {
      font-size: 0.8rem;
      color: #64748b;
      background: #1e293b;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      border: 1px solid #334155;
    }

    nav {
      display: flex;
      gap: 0.25rem;
      padding: 0.75rem 2rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .nav-btn:hover { background: #334155; color: #e2e8f0; }
    .nav-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: 600; }

    main { max-width: 720px; margin: 2rem auto; padding: 0 1.5rem; }

    .section { animation: fadeIn 0.3s ease; }
    .hidden { display: none !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    h2 { font-size: 1.1rem; color: #38bdf8; margin-bottom: 1rem; font-weight: 600; }
    h3 { font-size: 0.95rem; color: #94a3b8; margin: 1.5rem 0 0.75rem; }

    .route-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .route-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .route-id {
      background: #38bdf8;
      color: #0f172a;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    .route-name { font-weight: 600; font-size: 0.95rem; }
    .route-stops { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .route-meta { display: flex; gap: 1.5rem; font-size: 0.85rem; color: #64748b; }

    form { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1.25rem; }

    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.3rem; font-weight: 500; }

    input, select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    input:focus, select:focus { border-color: #38bdf8; }

    button[type="submit"], .btn-primary {
      width: 100%;
      padding: 0.65rem;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover, .btn-primary:hover { background: #7dd3fc; }

    .output {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      white-space: pre-line;
      line-height: 1.6;
    }

    .output.success { background: #064e3b; border: 1px solid #059669; color: #a7f3d0; }
    .output.error { background: #7f1d1d; border: 1px solid #dc2626; color: #fecaca; }
    .output.warning { background: #78350f; border: 1px solid #d97706; color: #fde68a; }

    .report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .stat-card.revenue { border-color: #38bdf8; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; }
    .stat-card.revenue .stat-value { color: #38bdf8; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }

    .route-stat { margin-bottom: 1rem; }
    .route-stat-header { font-size: 0.85rem; margin-bottom: 0.4rem; }

    .progress-bar {
      height: 8px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.3rem;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    small { color: #64748b; font-size: 0.78rem; }

    @media (max-width: 500px) {
      .report-grid { grid-template-columns: 1fr; }
      nav { padding: 0.5rem 1rem; }
      main { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🚌 Bus Reservation System</h1>
    <span>C++ OOP + WASM</span>
  </header>

  <nav>
    <button class="nav-btn active" data-section="routes" onclick="showSection('routes')">View Routes</button>
    <button class="nav-btn" data-section="book" onclick="showSection('book')">Book Ticket</button>
    <button class="nav-btn" data-section="cancel" onclick="showSection('cancel')">Cancel Ticket</button>
    <button class="nav-btn" data-section="search" onclick="showSection('search')">Search Ticket</button>
    <button class="nav-btn" data-section="report" onclick="showSection('report')">Revenue Report</button>
  </nav>

  <main>
    <div id="output" class="output hidden"></div>

    <!-- Routes Section -->
    <div id="section-routes" class="section">
      <h2>Available Routes</h2>
      <div id="routes-list"></div>
    </div>

    <!-- Book Section -->
    <div id="section-book" class="section hidden">
      <h2>Book a Ticket</h2>
      <form onsubmit="handleBook(event)">
        <label for="book-route">Select Route</label>
        <select id="book-route">
          <option value="R1">R1 — Chennai → Salem → Coimbatore (₹450)</option>
          <option value="R2">R2 — Chennai → Mayiladuthurai → Nagapattinam (₹350)</option>
          <option value="R3">R3 — Chennai → Madurai → Kanyakumari (₹550)</option>
        </select>
        <label for="book-name">Passenger Name</label>
        <input type="text" id="book-name" placeholder="Enter full name" required />
        <button type="submit">Book Ticket</button>
      </form>
    </div>

    <!-- Cancel Section -->
    <div id="section-cancel" class="section hidden">
      <h2>Cancel a Ticket</h2>
      <form onsubmit="handleCancel(event)">
        <label for="cancel-id">Ticket ID</label>
        <input type="text" id="cancel-id" placeholder="e.g. TKT1" required />
        <button type="submit">Cancel Ticket</button>
      </form>
    </div>

    <!-- Search Section -->
    <div id="section-search" class="section hidden">
      <h2>Search Ticket</h2>
      <form onsubmit="handleSearch(event)">
        <label for="search-id">Ticket ID</label>
        <input type="text" id="search-id" placeholder="e.g. TKT1" required />
        <button type="submit">Search</button>
      </form>
    </div>

    <!-- Report Section -->
    <div id="section-report" class="section hidden">
      <h2>Revenue Report</h2>
      <div id="report-content"></div>
    </div>
  </main>

  <script src="index.js"></script>
</body>
</html>
